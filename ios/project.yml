name: CardbornHeroes
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.13.0"
targets:
  CardbornHeroes:
    type: application
    platform: iOS
    sources:
      - path: CardbornHeroes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.skytownstudios.cardbornheroes
        INFOPLIST_FILE: CardbornHeroes/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: GoogleMobileAds
    info:
      path: CardbornHeroes/Info.plist
      properties:
        CFBundleDisplayName: Cardborn Heroes
        UILaunchScreen: {}
        GADApplicationIdentifier: $(ADMOB_APP_ID)
        NSUserTrackingUsageDescription: "This allows us to show more relevant ads."
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
