name: Release notes

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Setup config
        run: cp ios/Config/Secrets.xcconfig.example ios/Config/Secrets.xcconfig

      - name: Generate and build
        working-directory: ios
        run: |
          xcodegen generate
          SCHEME=$(grep '^name:' project.yml | head -1 | awk '{print $2}')
          xcodebuild -resolvePackageDependencies -scheme "$SCHEME"
          xcodebuild -scheme "$SCHEME" -destination 'generic/platform=iOS Simulator' -configuration Release build CODE_SIGNING_ALLOWED=NO

      - name: Summary
        run: |
          echo "Tag ${{ github.ref_name }} built successfully."
          echo "Complete App Store submission on Mac with Xcode."
