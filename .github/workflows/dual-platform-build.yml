name: Dual Platform Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: cp ios/Config/Secrets.xcconfig.example ios/Config/Secrets.xcconfig
      - working-directory: ios
        run: |
          xcodegen generate
          SCHEME=$(grep '^name:' project.yml | head -1 | awk '{print $2}')
          xcodebuild -resolvePackageDependencies -scheme "$SCHEME"
          xcodebuild -scheme "$SCHEME" -destination 'generic/platform=iOS Simulator' -configuration Debug build CODE_SIGNING_ALLOWED=NO

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - working-directory: android
        run: gradle assembleDebug
